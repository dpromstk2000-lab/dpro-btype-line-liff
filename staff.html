  <style>

    .panel{display:none}.panel.active{display:block}.panel-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:12px 0}.panel-head h2{margin:0;color:var(--green-900);font-size:26px}.panel-head p{margin:3px 0 0;color:var(--muted)}

    .transport-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.passenger-list{display:grid;gap:8px;margin-top:11px}.passenger{padding:11px;border:1px solid var(--line);border-radius:12px;background:#fbfcfb}.passenger-row{display:flex;justify-content:space-between;align-items:center;gap:9px}.passenger-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}.passenger-actions button{min-height:42px;padding:7px 10px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--green-800);font-weight:850}
    .bottom-nav{display:none;position:fixed;left:0;right:0;bottom:0;z-index:100;padding:6px max(7px,env(safe-area-inset-right)) calc(6px + env(safe-area-inset-bottom)) max(7px,env(safe-area-inset-left));border-top:1px solid var(--line);background:rgba(255,255,255,.97);backdrop-filter:blur(14px);grid-template-columns:repeat(5,1fr)}.bottom-btn{min-height:54px;border:0;border-radius:10px;background:transparent;color:var(--muted);font-size:11px;font-weight:850}.bottom-btn span{display:block;font-size:21px;line-height:1.1}.bottom-btn.active{background:var(--green-050);color:var(--green-800)}
    .modal-backdrop{position:fixed;inset:0;z-index:180;display:grid;place-items:center;padding:14px;background:rgba(16,58,49,.45);backdrop-filter:blur(4px)}.modal{width:min(680px,100%);max-height:calc(100vh - 28px);overflow:auto;padding:22px;border-radius:20px;background:#fff;box-shadow:0 24px 70px rgba(16,58,49,.28)}.modal-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.modal-head h3{margin:0;color:var(--green-900);font-size:23px}.modal-close{width:44px;height:44px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:22px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:16px}.field.full{grid-column:1/-1}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:19px}.toast-wrap{position:fixed;right:14px;bottom:78px;z-index:250;display:grid;gap:8px;max-width:min(430px,calc(100% - 28px))}.toast{padding:13px 16px;border-radius:12px;background:var(--green-900);color:#fff;box-shadow:var(--shadow);font-weight:800}.toast.error{background:var(--danger)}
    @media(max-width:900px){.summary-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.user-grid,.work-grid,.transport-grid{grid-template-columns:1fr}.staff-hero{grid-template-columns:1fr}.date-tools{justify-content:flex-start}}
    @media(max-width:660px){body{font-size:16px}.header-inner{width:calc(100% - 18px)}.brand-name{font-size:15px}.brand-sub{font-size:11px}.header-actions .label{display:none}.app{width:calc(100% - 16px);margin-top:9px;margin-bottom:86px}.staff-hero{padding:17px}.staff-hero h1{font-size:24px}.date-tools{display:grid;grid-template-columns:44px 1fr 44px 54px}.date-tools .input{width:100%;min-width:0}.summary-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.summary-card{min-height:96px}.summary-value{font-size:26px}.desktop-tabs{display:none}.panel-head{align-items:flex-start;flex-direction:column}.quick-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.bottom-nav{display:grid}.form-grid{grid-template-columns:1fr}.field.full{grid-column:auto}.modal{padding:18px}.modal-actions{display:grid;grid-template-columns:1fr 1fr}.user-grid,.work-grid{grid-template-columns:1fr}.card-actions{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="brand"><div class="brand-mark">支</div><div><span class="brand-name" id="facilityName">DPRO 就労継続支援B型事業所</span><span class="brand-sub">スタッフ用スマートフォン</span></div></div>
      <div class="header-actions"><button class="btn btn-secondary btn-small" id="refreshButton" type="button" hidden><span>↻</span><span class="label">更新</span></button><button class="btn btn-secondary btn-small" id="logoutButton" type="button" hidden><span>⇥</span><span class="label">ログアウト</span></button></div>
    </div>
  </header>

  <main class="login-wrap" id="loginView">
    <section class="login-card">
      <div class="login-head"><div class="login-icon">📱</div><h1>スタッフ画面</h1><p>今日の担当、作業、支援記録、申し送りを確認します。</p></div>
      <form class="form-stack" id="loginForm">
        <label class="field"><span class="field-label">職員コード <button class="btn btn-secondary btn-small" id="clearLogin" type="button">入力を削除</button></span><input class="input" id="staffCode" autocomplete="username" maxlength="32" placeholder="例：ST-003" required></label>
        <label class="field"><span class="field-label">PIN</span><div class="input-row"><input class="input" id="staffPin" type="password" inputmode="numeric" autocomplete="current-password" maxlength="12" placeholder="4桁以上" required><button class="btn btn-secondary" id="togglePin" type="button">表示</button></div></label>
        <button class="btn btn-primary" type="submit">スタッフ画面を開く</button>
      </form>
      <div id="loginMessage"></div>
      <div class="login-note"><strong>デモ環境</strong><br>職員コードは「ST-003」、PINは「1234」です。本番導入時は職員ごとにPINを変更します。</div>
    </section>
  </main>

  <main class="app" id="appView" hidden>
    <section class="staff-hero"><div><div style="font-size:12px;font-weight:850;letter-spacing:.08em">STAFF MOBILE</div><h1 id="staffHeading">スタッフさん</h1><p id="roleText"></p></div><div class="date-tools"><button class="hero-btn" id="prevDate" type="button">‹</button><input class="input" id="serviceDate" type="date"><button class="hero-btn" id="nextDate" type="button">›</button><button class="hero-btn" id="todayButton" type="button">今日</button></div></section>
    <section class="summary-grid" id="summaryGrid"></section>
    <nav class="desktop-tabs" aria-label="スタッフ機能"><button class="tab-btn active" data-view="home">ホーム</button><button class="tab-btn" data-view="work">作業</button><button class="tab-btn" data-view="record">支援記録</button><button class="tab-btn" data-view="handover">申し送り</button><button class="tab-btn" data-view="more">送迎・報告</button></nav>

    <section class="panel active" id="panel-home">
      <div class="panel-head"><div><h2>今日の担当</h2><p id="updatedText"></p></div><button class="btn btn-danger" type="button" data-open-incident>ヒヤリハット</button></div>
      <div class="quick-grid section-card"><button class="quick-card" type="button" data-go="work"><span class="quick-icon">▣</span>作業を確認</button><button class="quick-card" type="button" data-go="record"><span class="quick-icon">✎</span>支援記録</button><button class="quick-card" type="button" data-open-handover><span class="quick-icon">⇆</span>申し送り</button></div>
      <div class="user-grid" id="homeUsers"></div>
      <div class="section-card" style="margin-top:13px"><h3>事業所からのお知らせ</h3><div class="list" id="noticeList" style="margin-top:12px"></div></div>
    </section>

    <section class="panel" id="panel-work"><div class="panel-head"><div><h2>作業・実績</h2><p>開始、数量、達成度、支援量を記録します。</p></div></div><div class="work-grid" id="workGrid"></div></section>
    <section class="panel" id="panel-record"><div class="panel-head"><div><h2>支援記録</h2><p>本人の様子、支援内容、反応、次回対応を記録します。</p></div></div><div class="user-grid" id="recordUsers"></div></section>
    <section class="panel" id="panel-handover"><div class="panel-head"><div><h2>申し送り</h2><p>確認・完了を記録し、伝達漏れを防ぎます。</p></div><button class="btn btn-primary" type="button" data-open-handover>新規申し送り</button></div><div class="list" id="handoverList"></div></section>
    <section class="panel" id="panel-more"><div class="panel-head"><div><h2>送迎・報告</h2><p>担当送迎の乗降確認と事故・ヒヤリハット報告です。</p></div><button class="btn btn-danger" type="button" data-open-incident>報告を作成</button></div><div class="transport-grid" id="transportGrid"></div></section>
  </main>

  <nav class="bottom-nav" id="bottomNav" hidden><button class="bottom-btn active" data-view="home"><span>⌂</span>ホーム</button><button class="bottom-btn" data-view="work"><span>▣</span>作業</button><button class="bottom-btn" data-view="record"><span>✎</span>記録</button><button class="bottom-btn" data-view="handover"><span>⇆</span>申し送り</button><button class="bottom-btn" data-view="more"><span>⚑</span>送迎・報告</button></nav>

  <div class="modal-backdrop" id="modalBackdrop" hidden><div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle"><div class="modal-head"><div><h3 id="modalTitle">入力</h3><div id="modalSubtitle" class="item-meta"></div></div><button class="modal-close" id="modalClose" type="button" aria-label="閉じる">×</button></div><form id="modalForm"><div id="modalBody"></div><div class="modal-actions" id="modalActions"></div></form></div></div>
  <div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

  <script src="config.js"></script>
  <script>
  (()=>{
    "use strict";
    const config=window.DPRO_BTYPE_CONFIG||{};
    const API=String(config.API_BASE_URL||"").replace(/\/+$/,"");
    const FACILITY=String(config.FACILITY_CODE||"dpro_btype_demo");
    const SESSION_KEY="dpro_btype_staff_session";
    const $=(id)=>document.getElementById(id);
    const state={token:sessionStorage.getItem(SESSION_KEY)||"",date:localDate(),data:null,view:"home",busy:false,modal:null};
    const statusLabels={planned:"未到着",present:"出席",absent:"欠席",late:"遅刻",early_leave:"早退",home_support:"在宅支援",offsite:"施設外就労",trial:"体験",cancelled:"取消"};
    const assignmentLabels={planned:"予定",in_progress:"作業中",completed:"完了",cancelled:"取消"};
    const priorityLabels={normal:"通常",important:"重要",urgent:"緊急"};
    const incidentLabels={accident:"事故",near_miss:"ヒヤリハット",health:"体調",behavior:"行動",transport:"送迎",information:"情報",other:"その他"};
    function localDate(date=new Date()){return new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Tokyo",year:"numeric",month:"2-digit",day:"2-digit"}).format(date)}
    function escapeHtml(v){return String(v??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]))}
    function formatTime(v){if(!v)return"--:--";if(/^\d{2}:\d{2}/.test(v))return v.slice(0,5);try{return new Intl.DateTimeFormat("ja-JP",{timeZone:"Asia/Tokyo",hour:"2-digit",minute:"2-digit",hour12:false}).format(new Date(v))}catch{return"--:--"}}
    function formatDate(v){if(!v)return"";const d=new Date(v+"T00:00:00+09:00");return new Intl.DateTimeFormat("ja-JP",{timeZone:"Asia/Tokyo",month:"long",day:"numeric",weekday:"short"}).format(d)}
    function uuid(){return crypto.randomUUID?crypto.randomUUID():`${Date.now()}-${Math.random().toString(16).slice(2)}`}
    function setBusy(value){state.busy=value;document.querySelectorAll("button").forEach(btn=>{if(value){if(btn.dataset.lock!=="1"){btn.dataset.prev=btn.disabled?"1":"0";btn.dataset.lock="1"}btn.disabled=true}else if(btn.dataset.lock==="1"){btn.disabled=btn.dataset.prev==="1";delete btn.dataset.prev;delete btn.dataset.lock}})}
    function toast(message,error=false){const el=document.createElement("div");el.className=`toast${error?" error":""}`;el.textContent=message;$('toastWrap').appendChild(el);setTimeout(()=>el.remove(),4200)}
    function showMessage(target,message,error=false){target.innerHTML=message?`<div class="${error?"error-box":"success-box"}">${escapeHtml(message)}</div>`:""}
    async function api(path,{method="GET",body=null,auth=true,idempotency=false}={}){const headers={Accept:"application/json"};if(body!==null)headers["Content-Type"]="application/json";if(auth&&state.token)headers.Authorization=`Bearer ${state.token}`;if(idempotency)headers["Idempotency-Key"]=uuid();const res=await fetch(`${API}${path}`,{method,headers,body:body===null?null:JSON.stringify(body)});let data=null;try{data=await res.json()}catch{}if(!res.ok||!data||data.ok!==true){const err=new Error(data?.message||"通信に失敗しました。時間をおいてもう一度お試しください。");err.code=data?.error||"API_ERROR";err.status=res.status;throw err}return data}
    function clearSession(){state.token="";state.data=null;sessionStorage.removeItem(SESSION_KEY);$('appView').hidden=true;$('bottomNav').hidden=true;$('loginView').hidden=false;$('refreshButton').hidden=true;$('logoutButton').hidden=true}
    async function login(){setBusy(true);showMessage($('loginMessage'),"");try{const data=await api('/staff/session',{method:'POST',auth:false,body:{facility_code:FACILITY,staff_code:$('staffCode').value,pin:$('staffPin').value}});state.token=data.session_token;sessionStorage.setItem(SESSION_KEY,state.token);$('facilityName').textContent=data.facility_name||'DPRO 就労継続支援B型事業所';$('loginView').hidden=true;$('appView').hidden=false;$('bottomNav').hidden=false;$('refreshButton').hidden=false;$('logoutButton').hidden=false;await loadDashboard();toast('スタッフ画面を開きました。')}catch(e){showMessage($('loginMessage'),e.message,true)}finally{setBusy(false)}}
    async function loadDashboard(){if(!state.token)return;setBusy(true);try{const data=await api(`/staff/dashboard?facility_code=${encodeURIComponent(FACILITY)}&date=${encodeURIComponent(state.date)}`);state.data=data;renderAll()}catch(e){if(e.status===401){clearSession();showMessage($('loginMessage'),e.message,true)}else toast(e.message,true)}finally{setBusy(false)}}
    function renderAll(){const d=state.data;if(!d)return;$('serviceDate').value=state.date;$('staffHeading').textContent=`${d.staff.staff_name}さん`;$('roleText').textContent=`${d.staff.role_name}・${formatDate(state.date)}`;$('updatedText').textContent=`${formatDate(state.date)}　最終更新 ${formatTime(d.generated_at)}`;renderSummary();renderHome();renderWork();renderRecords();renderHandovers();renderTransport();switchView(state.view)}
    function renderSummary(){const c=state.data.counts||{};const cards=[["担当利用者",c.users||0],["作業",c.work_total||0],["作業中",c.work_in_progress||0],["未記録",c.support_unrecorded||0,"alert"],["申し送り",c.handovers||0],["送迎",c.transport||0]];$('summaryGrid').innerHTML=cards.map(([l,v,cls])=>`<article class="summary-card ${cls||''}"><div class="summary-label">${l}</div><div class="summary-value">${v}<span style="font-size:14px">件</span></div></article>`).join('')}
    function userBadges(u){return `<div class="badges"><span class="badge">${escapeHtml(statusLabels[u.attendance_status]||u.attendance_status)}</span>${u.alert_level&&u.alert_level!=='normal'?`<span class="badge warn">体調注意</span>`:''}${Number(u.support_record_count)===0?'<span class="badge danger">記録未入力</span>':'<span class="badge blue">記録済み</span>'}</div>`}
    function renderHome(){const users=state.data.users||[];$('homeUsers').innerHTML=users.length?users.map(u=>`<article class="user-card ${u.alert_level&&u.alert_level!=='normal'?'attention':''}"><div class="card-top"><div><h3 class="card-title">${escapeHtml(u.full_name)}</h3><div class="card-sub">${escapeHtml(u.user_code)}　${formatTime(u.planned_start_time)}〜${formatTime(u.planned_end_time)}</div></div></div>${userBadges(u)}${u.alert_text||u.required_accommodations?`<div class="note-box"><strong>確認：</strong>${escapeHtml(u.alert_text||u.required_accommodations)}</div>`:''}${u.latest_handover?`<div class="note-box"><strong>申し送り：</strong>${escapeHtml(u.latest_handover)}</div>`:''}<div class="card-actions"><button class="action-btn" data-record-user="${u.user_id}">支援記録</button><button class="action-btn warn" data-handover-user="${u.user_id}">申し送り</button></div></article>`).join(''):'<div class="empty">担当利用者はいません。</div>';const notices=state.data.notices||[];$('noticeList').innerHTML=notices.length?notices.map(n=>`<article class="notice-item"><div class="item-title">${escapeHtml(n.title)}</div><div style="margin-top:5px">${escapeHtml(n.body)}</div><div class="item-meta">${formatTime(n.publish_from)}</div></article>`).join(''):'<div class="empty">現在のお知らせはありません。</div>'}
    function renderWork(){const rows=state.data.work_assignments||[];$('workGrid').innerHTML=rows.length?rows.map(a=>{const r=a.result||{};const completed=a.assignment_status==='completed';return `<article class="work-card"><div class="card-top"><div><h3 class="card-title">${escapeHtml(a.full_name)}</h3><div class="card-sub">${escapeHtml(a.work_name)}　${formatTime(a.start_at)}〜${formatTime(a.end_at)}</div></div><span class="badge ${a.assignment_status==='in_progress'?'warn':completed?'blue':''}">${assignmentLabels[a.assignment_status]||a.assignment_status}</span></div><div class="badges"><span class="badge">目標 ${a.target_quantity??'-'}${escapeHtml(a.unit_name||'')}</span>${a.work_group_name?`<span class="badge">${escapeHtml(a.work_group_name)}</span>`:''}</div>${a.accommodation_note?`<div class="note-box"><strong>配慮：</strong>${escapeHtml(a.accommodation_note)}</div>`:''}${r.result_id?`<div class="note-box">実績 ${r.produced_quantity||0}${escapeHtml(a.unit_name||'')}・良品 ${r.good_quantity||0}・不良 ${r.defective_quantity||0}</div>`:''}<div class="card-actions"><button class="action-btn primary" data-start-work="${a.assignment_id}" ${a.assignment_status!=='planned'?'disabled':''}>作業開始</button><button class="action-btn" data-result-work="${a.assignment_id}" ${completed?'disabled':''}>実績入力</button></div></article>`}).join(''):'<div class="empty">この日の作業割当はありません。</div>'}
    function renderRecords(){const users=state.data.users||[];$('recordUsers').innerHTML=users.length?users.map(u=>`<article class="user-card ${Number(u.support_record_count)===0?'attention':''}"><div class="card-top"><div><h3 class="card-title">${escapeHtml(u.full_name)}</h3><div class="card-sub">支援記録 ${u.support_record_count||0}件</div></div></div>${userBadges(u)}${u.communication_method?`<div class="note-box"><strong>伝え方：</strong>${escapeHtml(u.communication_method)}</div>`:''}<div class="card-actions"><button class="action-btn primary" data-record-user="${u.user_id}">記録を追加</button><button class="action-btn warn" data-handover-user="${u.user_id}">申し送り</button></div></article>`).join(''):'<div class="empty">記録対象の利用者はいません。</div>'}
    function renderHandovers(){const notes=state.data.handovers||[];$('handoverList').innerHTML=notes.length?notes.map(n=>`<article class="handover-item ${n.priority}"><div class="item-head"><div><div class="item-title">${n.user_name?escapeHtml(n.user_name):'事業所全体'}　<span class="badge ${n.priority==='urgent'?'danger':n.priority==='important'?'warn':''}">${priorityLabels[n.priority]||n.priority}</span></div><div style="margin-top:6px">${escapeHtml(n.note_content)}</div><div class="item-meta">作成 ${escapeHtml(n.created_by_name||'')}・${formatTime(n.created_at)}</div></div></div><div class="item-actions">${n.status==='open'?`<button class="btn btn-secondary btn-small" data-handover-action="acknowledge" data-handover-id="${n.handover_id}">確認済み</button>`:''}<button class="btn btn-primary btn-small" data-handover-action="complete" data-handover-id="${n.handover_id}">完了</button></div></article>`).join(''):'<div class="empty">未完了の申し送りはありません。</div>'}
    function renderTransport(){const rows=state.data.transport_schedules||[];$('transportGrid').innerHTML=rows.length?rows.map(s=>`<article class="transport-card"><div class="item-head"><div><div class="item-title">${s.direction==='outbound'?'行き':'帰り'}・${escapeHtml(s.vehicle_name)}</div><div class="item-meta">${formatTime(s.start_at)}〜${formatTime(s.end_at)}　運転 ${escapeHtml(s.driver_name||'')}</div></div><span class="badge">${escapeHtml(s.status)}</span></div><div class="passenger-list">${(s.passengers||[]).map(p=>passengerHtml(p)).join('')||'<div class="empty">乗車予定者はいません。</div>'}</div></article>`).join(''):'<div class="empty">担当する送迎はありません。</div>'}
    function passengerHtml(p){const st=p.passenger_status||'scheduled';let actions='';if(st==='scheduled')actions=`<button data-passenger-id="${p.passenger_id}" data-transport-action="board">乗車</button><button data-passenger-id="${p.passenger_id}" data-transport-action="no_show">未乗車</button>`;else if(st==='boarded')actions=`<button data-passenger-id="${p.passenger_id}" data-transport-action="alight">降車</button>`;else if(st==='no_show'||st==='cancelled')actions=`<button data-passenger-id="${p.passenger_id}" data-transport-action="reset">予定に戻す</button>`;return `<div class="passenger"><div class="passenger-row"><div><strong>${escapeHtml(p.full_name)}</strong><div class="item-meta">${escapeHtml(p.pickup_location||p.dropoff_location||'場所未設定')}</div></div><span class="badge">${escapeHtml(st)}</span></div>${actions?`<div class="passenger-actions">${actions}</div>`:''}</div>`}
    function switchView(view){state.view=view;document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===`panel-${view}`));document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===view));window.scrollTo({top:0,behavior:'smooth'})}
    function findUser(id){return (state.data?.users||[]).find(u=>u.user_id===id)}function findAssignment(id){return (state.data?.work_assignments||[]).find(a=>a.assignment_id===id)}
    function openModal(title,subtitle,body,submitText,kind,context={}){state.modal={kind,context};$('modalTitle').textContent=title;$('modalSubtitle').textContent=subtitle||'';$('modalBody').innerHTML=body;$('modalActions').innerHTML=`<button class="btn btn-secondary" type="button" data-modal-cancel>戻る</button><button class="btn ${kind==='incident'?'btn-danger':'btn-primary'}" type="submit">${submitText}</button>`;$('modalBackdrop').hidden=false}
    function closeModal(){$('modalBackdrop').hidden=true;$('modalBody').innerHTML='';state.modal=null}
    function openWork(a){const r=a.result||{};openModal('作業実績',`${a.full_name}・${a.work_name}`,`<div class="form-grid"><label class="field"><span class="field-label">作業数（${escapeHtml(a.unit_name||'')}）</span><input class="input" name="produced_quantity" type="number" min="0" step="0.001" value="${r.produced_quantity||0}"></label><label class="field"><span class="field-label">良品数</span><input class="input" name="good_quantity" type="number" min="0" step="0.001" value="${r.good_quantity||0}"></label><label class="field"><span class="field-label">不良数</span><input class="input" name="defective_quantity" type="number" min="0" step="0.001" value="${r.defective_quantity||0}"></label><label class="field"><span class="field-label">達成度</span><select class="select" name="achievement_level"><option value="">未選択</option>${[1,2,3,4,5].map(v=>`<option value="${v}" ${Number(r.achievement_level)===v?'selected':''}>${v}</option>`).join('')}</select></label><label class="field"><span class="field-label">支援量</span><select class="select" name="support_level"><option value="">未選択</option>${[1,2,3,4,5].map(v=>`<option value="${v}" ${Number(r.support_level)===v?'selected':''}>${v}</option>`).join('')}</select></label><label class="field full"><span class="field-label">実績メモ</span><textarea class="textarea" name="result_note" maxlength="3000">${escapeHtml(r.result_note||'')}</textarea></label><label class="field full"><span class="field-label">登録方法</span><select class="select" name="action"><option value="save">途中保存</option><option value="complete">完了登録</option></select></label></div>`,'保存する','work',{assignment:a})}
    function openRecord(u){openModal('支援記録',u.full_name,`<div class="form-grid"><label class="field"><span class="field-label">記録種別</span><select class="select" name="record_type"><option value="daily">日次</option><option value="work">作業</option><option value="life">生活</option><option value="health">健康</option><option value="consultation">相談</option><option value="other">その他</option></select></label><label class="field full"><span class="field-label">本人の様子</span><textarea class="textarea" name="user_condition" maxlength="3000"></textarea></label><label class="field full"><span class="field-label">支援内容（必須）</span><textarea class="textarea" name="support_content" maxlength="5000" required></textarea></label><label class="field full"><span class="field-label">本人の反応</span><textarea class="textarea" name="user_response" maxlength="3000"></textarea></label><label class="field full"><span class="field-label">評価</span><textarea class="textarea" name="evaluation" maxlength="3000"></textarea></label><label class="field full"><span class="field-label">次回対応</span><textarea class="textarea" name="next_support" maxlength="3000"></textarea></label><label class="field full"><span class="field-label">職員への申し送り</span><textarea class="textarea" name="internal_handover" maxlength="3000"></textarea></label></div>`,'記録する','record',{user:u})}
    function openHandover(u=null){openModal('申し送りを作成',u?u.full_name:'事業所全体',`<div class="form-grid"><label class="field"><span class="field-label">優先度</span><select class="select" name="priority"><option value="normal">通常</option><option value="important">重要</option><option value="urgent">緊急</option></select></label><label class="field full"><span class="field-label">申し送り内容（必須）</span><textarea class="textarea" name="note_content" maxlength="3000" required></textarea></label></div>`,'登録する','handover',{user:u})}
    function openIncident(){const users=state.data?.users||[];openModal('事故・ヒヤリハット報告','緊急時は画面入力より安全確保・連絡を優先してください。',`<div class="form-grid"><label class="field"><span class="field-label">利用者</span><select class="select" name="user_id"><option value="">事業所全体・対象なし</option>${users.map(u=>`<option value="${u.user_id}">${escapeHtml(u.full_name)}</option>`).join('')}</select></label><label class="field"><span class="field-label">報告種別</span><select class="select" name="incident_type"><option value="near_miss">ヒヤリハット</option><option value="accident">事故</option><option value="health">体調</option><option value="behavior">行動</option><option value="transport">送迎</option><option value="information">情報</option><option value="other">その他</option></select></label><label class="field"><span class="field-label">重要度</span><select class="select" name="severity"><option value="minor">軽微</option><option value="moderate">中程度</option><option value="serious">重大</option><option value="critical">緊急</option></select></label><label class="field"><span class="field-label">発生場所</span><input class="input" name="location" maxlength="300"></label><label class="field full"><span class="field-label">発生状況（必須）</span><textarea class="textarea" name="description" maxlength="5000" required></textarea></label><label class="field full"><span class="field-label">初期対応</span><textarea class="textarea" name="initial_response" maxlength="5000"></textarea></label></div>`,'報告を登録','incident')}
    async function startWork(id){setBusy(true);try{const data=await api('/staff/work',{method:'POST',body:{facility_code:FACILITY,assignment_id:id,action:'start'},idempotency:true});toast(data.message);await loadDashboard()}catch(e){toast(e.message,true)}finally{setBusy(false)}}
    async function transportAction(id,action){setBusy(true);try{const data=await api('/staff/transport',{method:'POST',body:{facility_code:FACILITY,passenger_id:id,action}});toast(data.message);await loadDashboard()}catch(e){toast(e.message,true)}finally{setBusy(false)}}
    async function handoverAction(id,action){setBusy(true);try{const data=await api('/staff/handover',{method:'POST',body:{facility_code:FACILITY,handover_id:id,action}});toast(data.message);await loadDashboard()}catch(e){toast(e.message,true)}finally{setBusy(false)}}
    async function submitModal(form){if(!state.modal)return;const fd=new FormData(form);const values=Object.fromEntries(fd.entries());const {kind,context}=state.modal;setBusy(true);try{let data;if(kind==='work')data=await api('/staff/work',{method:'POST',body:{facility_code:FACILITY,assignment_id:context.assignment.assignment_id,...values},idempotency:true});if(kind==='record')data=await api('/staff/support-record',{method:'POST',body:{facility_code:FACILITY,user_id:context.user.user_id,service_date:state.date,...values},idempotency:true});if(kind==='handover')data=await api('/staff/handover',{method:'POST',body:{facility_code:FACILITY,action:'create',user_id:context.user?.user_id||null,...values}});if(kind==='incident')data=await api('/staff/incident',{method:'POST',body:{facility_code:FACILITY,...values}});closeModal();toast(data.message);await loadDashboard()}catch(e){toast(e.message,true)}finally{setBusy(false)}}
    async function logout(){try{await api('/staff/logout',{method:'POST',body:{facility_code:FACILITY}})}catch{}clearSession();showMessage($('loginMessage'),'ログアウトしました。')}
    function changeDate(days){const d=new Date(`${state.date}T00:00:00+09:00`);d.setDate(d.getDate()+days);state.date=localDate(d);loadDashboard()}
    $('loginForm').addEventListener('submit',e=>{e.preventDefault();login()});$('clearLogin').addEventListener('click',()=>{$('staffCode').value='';$('staffPin').value='';$('staffCode').focus()});$('togglePin').addEventListener('click',()=>{const input=$('staffPin');input.type=input.type==='password'?'text':'password';$('togglePin').textContent=input.type==='password'?'表示':'隠す'});$('refreshButton').addEventListener('click',loadDashboard);$('logoutButton').addEventListener('click',logout);$('prevDate').addEventListener('click',()=>changeDate(-1));$('nextDate').addEventListener('click',()=>changeDate(1));$('todayButton').addEventListener('click',()=>{state.date=localDate();loadDashboard()});$('serviceDate').addEventListener('change',()=>{state.date=$('serviceDate').value||localDate();loadDashboard()});
    document.addEventListener('click',e=>{const view=e.target.closest('[data-view]');if(view)switchView(view.dataset.view);const go=e.target.closest('[data-go]');if(go)switchView(go.dataset.go);const record=e.target.closest('[data-record-user]');if(record){const u=findUser(record.dataset.recordUser);if(u)openRecord(u)}const ho=e.target.closest('[data-handover-user]');if(ho){const u=findUser(ho.dataset.handoverUser);openHandover(u)}if(e.target.closest('[data-open-handover]'))openHandover();if(e.target.closest('[data-open-incident]'))openIncident();const start=e.target.closest('[data-start-work]');if(start)startWork(start.dataset.startWork);const result=e.target.closest('[data-result-work]');if(result){const a=findAssignment(result.dataset.resultWork);if(a)openWork(a)}const ha=e.target.closest('[data-handover-action]');if(ha)handoverAction(ha.dataset.handoverId,ha.dataset.handoverAction);const ta=e.target.closest('[data-transport-action]');if(ta)transportAction(ta.dataset.passengerId,ta.dataset.transportAction);if(e.target.closest('[data-modal-cancel]'))closeModal()});
    $('modalClose').addEventListener('click',closeModal);$('modalBackdrop').addEventListener('click',e=>{if(e.target===$('modalBackdrop'))closeModal()});$('modalForm').addEventListener('submit',e=>{e.preventDefault();submitModal(e.currentTarget)});
    const demo=new URLSearchParams(location.search).get('demo')==='1';if(demo&&FACILITY==='dpro_btype_demo'){$('staffCode').value=config.DEMO_STAFF_CODE||'ST-003';$('staffPin').value='1234'}
    if(state.token){$('loginView').hidden=true;$('appView').hidden=false;$('bottomNav').hidden=false;$('refreshButton').hidden=false;$('logoutButton').hidden=false;loadDashboard()}else $('staffCode').focus();
  })();
  </script>
</body>
</html>
